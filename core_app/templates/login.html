{% extends 'base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
        padding: 20px;
    }

    .login-card {
        border: 3px solid #dc3545;
        box-shadow: 0 10px 40px rgba(220, 53, 69, 0.15);
        border-radius: 16px;
        background: #fff;
    }

    .login-card .card-body {
        padding: 50px;
    }

    .login-card h2 {
        color: #dc3545;
        margin-bottom: 30px;
        text-align: center;
        font-size: 28px;
    }

    form input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        margin-bottom: 20px;
        background-color: #f7fafc;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    form input:focus {
        border-color: #dc3545;
        outline: none;
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
    }

    form input::placeholder {
        color: #a0aec0;
    }

    label {
        font-weight: 600;
        margin-bottom: 10px;
        display: block;
        color: #2d3748;
        font-size: 15px;
    }

    .btn-submit {
        background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        border: none;
        font-size: 16px;
        font-weight: 600;
        padding: 14px;
        border-radius: 10px;
    }

    .alert-danger {
        background-color: #fed7d7;
        border: 1px solid #fc8181;
        border-radius: 10px;
        color: #c53030;
        margin-bottom: 25px;
    }

    .alert-danger p {
        margin-bottom: 5px;
    }

    hr {
        margin: 30px 0;
        border: none;
        border-top: 1px solid #e2e8f0;
    }

    .signup-link {
        text-align: center;
        color: #718096;
        font-size: 15px;
    }

    .signup-link a {
        color: #dc3545;
        font-weight: 600;
        text-decoration: none;
    }

    /* Mobile optimization */
    @media (max-width: 576px) {
        .login-card .card-body {
            padding: 30px 20px;
        }

        .login-card h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        form input {
            padding: 12px 14px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .btn-submit {
            padding: 12px;
            font-size: 15px;
        }

        .signup-link {
            font-size: 14px;
        }

        hr {
            margin: 20px 0;
        }
    }

    /* Tablet optimization */
    @media (min-width: 577px) and (max-width: 768px) {
        .login-card .card-body {
            padding: 40px;
        }

        .login-card h2 {
            font-size: 26px;
        }
    }
</style>

<div class="login-container">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-11 col-md-10 col-lg-8 col-xl-7">
                <div class="card login-card">
                    <div class="card-body">
                        <h2 class="fw-bold">Вход в аккаунт</h2>

                        {% if form.non_field_errors %}
                            <div class="alert alert-danger">
                                {% for error in form.non_field_errors %}
                                    <p>{{ error }}</p>
                                {% endfor %}
                            </div>
                        {% endif %}

                        <form method="post" novalidate>
                            {% csrf_token %}
                            {{ form.as_p }}

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-submit text-white btn-lg">Войти</button>
                            </div>
                        </form>

                        <hr>
                        <p class="signup-link">
                            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
