{% extends 'base.html' %}
{% block title %}Удалить объявление{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-5">
                <h3 class="fw-bold mb-4 text-danger">⚠️ Подтверждение удаления</h3>

                <p class="fs-5 mb-3">Вы уверены, что хотите удалить объявление:</p>
                <p class="card bg-light p-3 rounded-3 mb-4">
                    <strong>{{ ad.title }}</strong><br>
                    <small class="text-muted">{{ ad.description|truncatewords:10 }}</small>
                </p>

                <p class="text-muted mb-4">
                    Это действие <strong>нельзя отменить</strong>.
                </p>

                <form method="post" class="d-flex justify-content-between gap-3">
                    {% csrf_token %}
                    <a href="{% url 'profile' %}" class="btn btn-light btn-lg px-5 rounded-3">Отмена</a>
                    <button type="submit" class="btn btn-danger btn-lg px-5 rounded-3">Удалить объявление</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
